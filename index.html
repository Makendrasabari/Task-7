<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Product Listing</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }

        h1 {
            text-align: center;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }

        input,
        select,
        button {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            cursor: pointer;
            background: #333;
            color: white;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            transition: 0.3s;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: contain;
        }

        .price-btn {
            background: green;
            margin-top: 10px;
            width: 100%;
        }

        .view-btn {
            margin-top: 5px;
            width: 100%;
            background: #007bff;
        }

        .error {
            color: red;
            text-align: center;
        }

        .loader {
            text-align: center;
            font-size: 20px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
        }

        .close {
            float: right;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>Product Listing</h1>

    <div class="controls">
        <input type="text" id="search" placeholder="Search products..." />

        <select id="category">
            <option value="">All Categories</option>
            <option value="electronics">Electronics</option>
            <option value="jewelery">Jewellery</option>
            <option value="men's clothing">Men</option>
            <option value="women's clothing">Women</option>
        </select>

        <button onclick="sortPrice('low')">Low → High</button>
        <button onclick="sortPrice('high')">High → Low</button>
    </div>

    <div id="loader" class="loader">Loading...</div>
    <div id="error" class="error"></div>
    <div class="grid" id="products"></div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">X</span>
            <h3 id="modalTitle"></h3>
            <img id="modalImg" width="100%">
            <p id="modalDesc"></p>
            <p><b id="modalPrice"></b></p>
        </div>
    </div>

    <script>
        let allProducts = [];
        let filteredProducts = [];

        const loader = document.getElementById("loader");
        const errorDiv = document.getElementById("error");
        const productContainer = document.getElementById("products");

        async function fetchProducts() {
            try {
                loader.style.display = "block";
                const res = await fetch("https://fakestoreapi.com/products");
                const data = await res.json();

                allProducts = data;
                filteredProducts = data;

                displayProducts(data);
            } catch (err) {
                errorDiv.innerText = "Error loading data";
            } finally {
                loader.style.display = "none";
            }
        }

        function displayProducts(products) {
            productContainer.innerHTML = "";

            products.forEach(p => {
                const card = document.createElement("div");
                card.className = "card";

                card.innerHTML = `
        <img src="${p.image}" />
        <h4>${p.title.slice(0, 20)}</h4>
        <p>${p.description.slice(0, 60)}...</p>
        <button class="price-btn">$${p.price}</button>
        <button class="view-btn" onclick='viewDetails(${JSON.stringify(p)})'>View More</button>
      `;

                productContainer.appendChild(card);
            });
        }

        document.getElementById("search").addEventListener("input", (e) => {
            const value = e.target.value.toLowerCase();
            filteredProducts = allProducts.filter(p =>
                p.title.toLowerCase().includes(value)
            );
            displayProducts(filteredProducts);
        });

        document.getElementById("category").addEventListener("change", (e) => {
            const value = e.target.value;
            filteredProducts = value
                ? allProducts.filter(p => p.category === value)
                : allProducts;

            displayProducts(filteredProducts);
        });


        function sortPrice(type) {
            let sorted = [...filteredProducts];
            if (type === "low") {
                sorted.sort((a, b) => a.price - b.price);
            } else {
                sorted.sort((a, b) => b.price - a.price);
            }
            displayProducts(sorted);
        }

        function viewDetails(product) {
            document.getElementById("modal").style.display = "flex";
            document.getElementById("modalTitle").innerText = product.title;
            document.getElementById("modalImg").src = product.image;
            document.getElementById("modalDesc").innerText = product.description;
            document.getElementById("modalPrice").innerText = "$" + product.price;
        }

        function closeModal() {
            document.getElementById("modal").style.display = "none";
        }

        fetchProducts();
    </script>

</body>

</html>
